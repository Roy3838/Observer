# SignPath GitHub Policy for Observer release-signing (production OV certificate)
# This policy file is required by the SignPath GitHub Actions connector
# See: https://docs.signpath.io/integrations/github-actions

artifact-configuration: .signpath/artifact-configuration.xml

github-policies:
  # Allow signing from the dedicated Windows signing workflow
  - branches:
      - main
    workflow-file: .github/workflows/sign-windows.yml
