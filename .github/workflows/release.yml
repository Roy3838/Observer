# .github/workflows/release.yml

name: 'Release: Build and Upload Tauri App'

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v2.1.0)'
        required: true
        type: string

jobs:
  build-tauri:
    # Use a strategy matrix to build on both windows and macos
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: macos-latest       # Apple Silicon (ARM64)
            target: aarch64-apple-darwin
          - os: macos-15-intel     # Intel (x86_64)
            target: x86_64-apple-darwin
          - os: ubuntu-latest      # Linux (x86_64)
            target: x86_64-unknown-linux-gnu
          - os: windows-latest     # Windows (x86_64)
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform.os }}
    steps:
      # 1. Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Using LTS version 18, which is very stable

      # 3. Install Rust toolchain
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Pin webkit to older version to avoid EGL_BAD_PARAMETER in AppImage
      - name: Install Linux dependencies
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # Pin libwebkit2gtk to 2.44.x to avoid EGL issues on Fedora/Arch
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libpipewire-0.3-dev libgbm-dev
          sudo apt-get install -y --allow-downgrades \
            libwebkit2gtk-4.1-dev=2.44.* \
            libwebkit2gtk-4.1-0=2.44.* \
            gir1.2-webkit2-4.1=2.44.* \
            libjavascriptcoregtk-4.1-dev=2.44.* \
            libjavascriptcoregtk-4.1-0=2.44.* \
            gir1.2-javascriptcoregtk-4.1=2.44.*
      #
      # - name: Workaround for AppImage project migration
      #   if: matrix.platform.os == 'ubuntu-latest'
      #   run: |
      #     mkdir -p ~/.cache/tauri-bundler/
      #     wget -O ~/.cache/tauri-bundler/AppRun-x86_64 https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
      #     chmod +x ~/.cache/tauri-bundler/AppRun-x86_64

      # 4. Install pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 5. Install frontend dependencies
      - name: Install app dependencies
        run: pnpm install
        working-directory: ./app

      # 6. Build the frontend
      - name: Build frontend
        run: pnpm build
        working-directory: ./app

      # 7. Build the observe CLI and stage it as a named sidecar for Tauri
      - name: Build observe CLI
        run: cargo build --release --manifest-path cli/Cargo.toml

      - name: Stage observe CLI sidecar
        shell: bash
        run: |
          mkdir -p app/desktop/binaries
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp cli/target/release/observe.exe "app/desktop/binaries/observe-${{ matrix.platform.target }}.exe"
          else
            cp cli/target/release/observe "app/desktop/binaries/observe-${{ matrix.platform.target }}"
          fi

      # 8. Build the Tauri application and create a GitHub release
      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          # macOS code signing and notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # Desktop Tauri project location
          projectPath: ./app/desktop

          # Config for the GitHub Release
          tagName: ${{ inputs.tag || github.ref_name }} # Uses input tag (manual) or pushed tag (auto)
          releaseName: 'Observer AI ${{ inputs.tag || github.ref_name }}'
          releaseBody: |
            This is an automated release.
            See the assets below to download the application for your operating system.

          # Creates a draft release. You must manually publish it after the workflow is done.
          # This is safer as it allows you to review and add changelogs.
          releaseDraft: true

          # Set to true if your tag is a pre-release like v1.0.0-beta.1
          prerelease: false

      # 9. Windows Code Signing with SignPath
      - name: Upload unsigned Windows artifact
        if: matrix.platform.os == 'windows-latest'
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-windows-${{ matrix.platform.target }}
          path: |
            app/desktop/target/release/bundle/nsis/*.exe
            app/desktop/target/release/bundle/msi/*.msi

      - name: Sign Windows installer with SignPath
        if: matrix.platform.os == 'windows-latest'
        id: signpath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'observer'
          signing-policy-slug: 'test-signing'
          artifact-configuration-slug: 'windows-nsis-installer'
          github-artifact-id: '${{ steps.upload-unsigned.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'signed-windows'

      # 10. Re-generate Tauri updater signatures for the code-signed binaries
      # SignPath modifies the binary (embeds certificate), which changes the hash.
      # We must re-sign with Tauri's updater key so the updater can verify the signed binaries.
      - name: Re-generate Tauri updater signatures for signed binaries
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          # Install Tauri CLI
          cargo install tauri-cli --version "^2.0"

          # Find and sign all .exe files
          Get-ChildItem -Path "signed-windows" -Recurse -Filter "*.exe" | ForEach-Object {
            Write-Host "Generating Tauri updater signature for: $($_.FullName)"
            $sigFile = "$($_.FullName).sig"

            # Generate signature using Tauri signer
            cargo tauri signer sign --private-key "$env:TAURI_SIGNING_PRIVATE_KEY" --password "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$($_.FullName)"

            Write-Host "Created signature: $sigFile"
          }

          # Find and sign all .msi files
          Get-ChildItem -Path "signed-windows" -Recurse -Filter "*.msi" | ForEach-Object {
            Write-Host "Generating Tauri updater signature for: $($_.FullName)"
            $sigFile = "$($_.FullName).sig"

            # Generate signature using Tauri signer
            cargo tauri signer sign --private-key "$env:TAURI_SIGNING_PRIVATE_KEY" --password "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$($_.FullName)"

            Write-Host "Created signature: $sigFile"
          }

          # List all files in signed-windows to verify
          Write-Host "Files in signed-windows after re-signing:"
          Get-ChildItem -Path "signed-windows" -Recurse | ForEach-Object { Write-Host $_.FullName }
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # 11. Update latest.json with new Windows signatures
      # The updater reads signatures from latest.json, not from .sig files
      - name: Update latest.json with new Windows signatures
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag || github.ref_name }}"

          # Download current latest.json from the release
          Write-Host "Downloading latest.json from release..."
          gh release download $tag --pattern "latest.json" --dir "." --clobber

          # Read current latest.json
          $latestJson = Get-Content -Path "latest.json" -Raw | ConvertFrom-Json

          # Read new signatures from .sig files
          $nsisExe = Get-ChildItem -Path "signed-windows" -Recurse -Filter "*-setup.exe" | Select-Object -First 1
          $msiFile = Get-ChildItem -Path "signed-windows" -Recurse -Filter "*.msi" | Select-Object -First 1

          if ($nsisExe) {
            $nsisSignature = Get-Content -Path "$($nsisExe.FullName).sig" -Raw
            Write-Host "New NSIS signature: $($nsisSignature.Substring(0, 50))..."

            # Update windows-x86_64-nsis signature
            if ($latestJson.platforms.'windows-x86_64-nsis') {
              $latestJson.platforms.'windows-x86_64-nsis'.signature = $nsisSignature.Trim()
            }
          }

          if ($msiFile) {
            $msiSignature = Get-Content -Path "$($msiFile.FullName).sig" -Raw
            Write-Host "New MSI signature: $($msiSignature.Substring(0, 50))..."

            # Update windows-x86_64 and windows-x86_64-msi signatures
            if ($latestJson.platforms.'windows-x86_64') {
              $latestJson.platforms.'windows-x86_64'.signature = $msiSignature.Trim()
            }
            if ($latestJson.platforms.'windows-x86_64-msi') {
              $latestJson.platforms.'windows-x86_64-msi'.signature = $msiSignature.Trim()
            }
          }

          # Write updated latest.json
          $latestJson | ConvertTo-Json -Depth 10 | Set-Content -Path "latest.json" -Encoding UTF8

          Write-Host "Updated latest.json:"
          Get-Content -Path "latest.json"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload signed Windows installer and updated latest.json to release
        if: matrix.platform.os == 'windows-latest'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: |
            signed-windows/**/*.exe
            signed-windows/**/*.exe.sig
            signed-windows/**/*.msi
            signed-windows/**/*.msi.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
